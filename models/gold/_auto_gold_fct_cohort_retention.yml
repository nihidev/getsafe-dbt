version: 2

models:
  - name: gold_fct_cohort_retention
    description: >
      This model calculates the retention rate of customer cohorts over time. 
      It is built from the source model 'gold_fct_customer_activity_daily' and 
      provides insights into customer retention by cohort month, product group, 
      and months since acquisition.
    columns:
      - name: cohort_month
        description: "The month when a customer first joined, truncated to the start of the month."
        tests:
          - not_null
      - name: product_group
        description: "The category or group of products associated with the customer activity."
        tests:
          - not_null
      - name: months_since_acquisition
        description: "The number of months elapsed since the cohort month."
        tests:
          - not_null
      - name: cohort_size
        description: "The number of distinct users in the cohort during the cohort month."
        tests:
          - not_null
      - name: active_customers
        description: "The number of distinct users still active in a given activity month."
        tests:
          - not_null
      - name: retention_rate
        description: "The percentage of active customers relative to the cohort size, rounded to one decimal place."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['cohort_month', 'product_group', 'months_since_acquisition']
