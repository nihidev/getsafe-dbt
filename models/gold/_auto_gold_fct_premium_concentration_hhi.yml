version: 2

models:
  - name: gold_fct_premium_concentration_hhi
    description: >
      Monthly premium concentration risk model using the Herfindahl-Hirschman Index (HHI).
      Grain: one row per reinsurance party × month. Each row carries both the party-level
      market share and the month-level HHI score, enabling analysis of concentration trends
      over time. HHI < 1500 = competitive, 1500-2500 = moderately concentrated, > 2500 = highly concentrated.

    columns:
      - name: party
        description: Reinsurance party name (berlinre, dronant, getland, liadigital).
        tests:
          - not_null

      - name: month
        description: Calendar month in YYYY-MM format.
        tests:
          - not_null

      - name: net_premium
        description: Party net premium for the month (written minus refunds), in EUR.
        tests:
          - not_null

      - name: written_premium
        description: Gross written premium before refunds, in EUR.

      - name: total_net_premium
        description: Total net premium across all parties for the month, in EUR.
        tests:
          - not_null

      - name: market_share_pct
        description: Party share of total monthly net premium, as a percentage (0-100).
        tests:
          - not_null

      - name: hhi_score
        description: >
          Herfindahl-Hirschman Index for the month (0-10000).
          Computed as SUM(market_share squared) x 10000 across all parties.
        tests:
          - not_null

      - name: active_parties
        description: Number of distinct parties with net premium in the month.

      - name: concentration_level
        description: Categorical HHI classification for the month.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [competitive, moderately_concentrated, highly_concentrated]

      - name: dominant_party_flag
        description: TRUE if any single party holds more than 40% market share that month.

      - name: transaction_count
        description: Number of transactions for this party in the month.

      - name: _created_at
        description: Timestamp when this row was materialised.
        tests:
          - not_null
