version: 2

models:
  - name: gold_fct_premium_concentration_hhi
  config: 
    materialized: table
    schema: public_gold
  description: >
    This model calculates the monthly premium concentration risk using the Herfindahl-Hirschman Index (HHI) for each reinsurance party. The HHI is a measure of market concentration and is used to determine the level of competition among reinsurance parties based on their share of total net premiums.
  columns:
    - name: month
      description: "The month for which the premium concentration risk is calculated."
      tests:
        - not_null
    - name: hhi
      description: "The Herfindahl-Hirschman Index (HHI) value representing the concentration of premiums among reinsurance parties for the given month."
      tests:
        - not_null
    - name: _created_at
      description: "The timestamp indicating when the record was created."
      tests:
        - not_null
