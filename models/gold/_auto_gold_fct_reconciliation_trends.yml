version: 2

models:
  - name: gold_fct_reconciliation_trends
    description: >
      This model provides a detailed analysis of reconciliation trends between finance and accounting premiums, 
      highlighting discrepancies and their changes over time. It is designed to track the widening of gaps 
      and categorize them into bands for better understanding and reporting.
    columns:
      - name: party
        description: The identifier for the party involved in the reconciliation.
        tests:
          - not_null
      - name: month
        description: The month for which the reconciliation data is recorded.
        tests:
          - not_null
      - name: finance_premium
        description: The premium amount recorded by the finance department.
      - name: accounting_premium
        description: The premium amount recorded by the accounting department.
      - name: delta
        description: The difference between finance_premium and accounting_premium.
      - name: previous_delta
        description: The delta value from the previous month for the same party.
      - name: delta_change
        description: The change in delta from the previous month to the current month.
      - name: is_widening
        description: Indicates if the gap between finance and accounting premiums is widening.
      - name: consecutive_widening
        description: The count of consecutive months where the gap is widening.
      - name: gap_pct
        description: The percentage representation of the gap relative to the accounting premium.
      - name: gap_band
        description: The categorization of the gap percentage into bands: '<1%', '1–5%', '>5%'.
        tests:
          - accepted_values:
              values: ['<1%', '1–5%', '>5%']
      - name: reconciliation_status
        description: The status of the reconciliation process.
      - name: _created_at
        description: The timestamp when the record was created.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ['party', 'month']
