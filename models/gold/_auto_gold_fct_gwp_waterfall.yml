version: 2

models:
  - name: gold_fct_gwp_waterfall
    description: >
      This model calculates the gross written premium (GWP) waterfall by party and month. It classifies transactions into new business, renewal, and lapsed categories, and computes various premium metrics including net written premium and lapse-to-new-business ratio.
    columns:
      - name: party
        description: The identifier for the party, derived from the product group in the source data.
        tests:
          - not_null
      - name: month
        description: The month of the activity, truncated to the first day of the month.
        tests:
          - not_null
      - name: new_business_premium
        description: The total premium for new business transactions within the month.
      - name: renewal_premium
        description: The total premium for renewal transactions within the month.
      - name: lapsed_premium
        description: The total premium for users who lapsed, calculated from their prior month's premium.
      - name: net_written_premium
        description: The net written premium, calculated as new business premium plus renewal premium minus lapsed premium.
      - name: lapse_to_new_business_ratio
        description: The ratio of lapsed premium to new business premium, rounded to two decimal places.
      - name: _created_at
        description: The timestamp when the record was created.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ['party', 'month']
