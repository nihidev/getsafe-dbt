version: 2

models:
  - name: gold_fct_gwp_waterfall
    description: >
      This model calculates the gross written premium (GWP) waterfall by classifying transactions per user per month into new business, renewal, and lapsed categories. It aggregates premiums and computes key metrics such as net written premium and lapse-to-new-business ratio at the grain of one row per (party, month).

    columns:
      - name: party
        description: The identifier for the party, derived from the product_group in the source data.
        tests:
          - not_null

      - name: month
        description: The month of the activity, truncated to the first day of the month.
        tests:
          - not_null

      - name: new_business_premium
        description: The total premium for new business transactions, calculated as the sum of daily premiums where the transaction type is new_business.
        tests:
          - not_null

      - name: renewal_premium
        description: The total premium for renewal transactions, calculated as the sum of daily premiums where the transaction type is renewal.
        tests:
          - not_null

      - name: lapsed_premium
        description: The total premium for lapsed transactions, calculated as the sum of daily premiums for users who were active in the prior month but not in the current month.
        tests:
          - not_null

      - name: net_written_premium
        description: The net written premium, calculated as new_business_premium plus renewal_premium minus lapsed_premium.
        tests:
          - not_null

      - name: lapse_to_new_business_ratio
        description: The ratio of lapsed premium to new business premium, rounded to two decimal places.
        tests:
          - not_null

      - name: _created_at
        description: The timestamp when the record was created, set to the current timestamp.
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ['party', 'month']
