name: dbt post-merge

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Fallback: some git clients / API merges fire push instead of pull_request
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      model:
        description: "dbt model name to run (e.g. gold_fct_monthly_churn_rate_by_party)"
        required: true
      ticket:
        description: "Linear ticket identifier (e.g. GET-15)"
        required: true

jobs:
  dbt-run:
    # Pull-request merge: only for merged auto/ PRs
    # Push to main: only when the head commit message contains [auto, GET-
    # Manual dispatch: always run
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'auto/')) ||
      (github.event_name == 'push' &&
       contains(github.event.head_commit.message, '[auto, GET-'))

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-postgres
        run: pip install dbt-postgres==1.8.*

      - name: Extract model name and ticket
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODEL="${{ github.event.inputs.model }}"
            TICKET="${{ github.event.inputs.ticket }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
            WITHOUT_PREFIX="${BRANCH#auto/}"
            TICKET=$(echo "$WITHOUT_PREFIX" | grep -oP '^[a-z]+-\d+' | tr '[:lower:]' '[:upper:]')
            MODEL=$(echo "$WITHOUT_PREFIX" | sed "s/^[a-z]\+-[0-9]\+-//")
          else
            # push event — extract from commit message: "feat: model_name [auto, GET-N]"
            MSG="${{ github.event.head_commit.message }}"
            TICKET=$(echo "$MSG" | grep -oP '\[auto, \K[A-Z]+-\d+')
            MODEL=$(echo "$MSG" | grep -oP 'feat: \K[a-z_]+' | head -1)
          fi
          echo "ticket=$TICKET" >> $GITHUB_OUTPUT
          echo "model=$MODEL"   >> $GITHUB_OUTPUT
          echo "Trigger=${{ github.event_name }} | Ticket=$TICKET | Model=$MODEL"

      - name: Write dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
getsafe_analytics:
  target: supabase
  outputs:
    supabase:
      type: postgres
      host: ${{ secrets.SUPABASE_HOST }}
      user: ${{ secrets.SUPABASE_USER }}
      password: ${{ secrets.SUPABASE_PASSWORD }}
      port: 5432
      dbname: postgres
      schema: public
      threads: 4
      connect_timeout: 10
      sslmode: require
EOF

      - name: Install dbt packages
        run: dbt deps

      - name: dbt seed
        run: dbt seed --target supabase
        continue-on-error: true

      - name: dbt run
        id: dbt_run
        run: dbt run --select ${{ steps.meta.outputs.model }} --target supabase
        continue-on-error: true

      - name: dbt test
        id: dbt_test
        if: steps.dbt_run.outcome == 'success'
        run: dbt test --select ${{ steps.meta.outputs.model }} --target supabase
        continue-on-error: true

      - name: Notify Linear — success
        if: steps.dbt_run.outcome == 'success' && steps.dbt_test.outcome == 'success'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TICKET: ${{ steps.meta.outputs.ticket }}
          MODEL: ${{ steps.meta.outputs.model }}
        run: |
          ISSUE_ID=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { issue(id:\\\"$TICKET\\\") { id } }\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['issue']['id'])")

          curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { commentCreate(input: { issueId: \\\"$ISSUE_ID\\\", body: \\\"## ✅ dbt Run Complete\\\\n\\\\n\`$MODEL\` is now materialized in Supabase.\\\\n\\\\ndbt run ✅ · dbt test ✅\\\\n\\\\nThe agent will create the Metabase dashboard on the next /check-prs call.\\\\n\\\\n> 🤖 GitHub Actions\\\" }) { success } }\"}"

      - name: Notify Linear — failure
        if: steps.dbt_run.outcome == 'failure' || steps.dbt_test.outcome == 'failure'
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          TICKET: ${{ steps.meta.outputs.ticket }}
          MODEL: ${{ steps.meta.outputs.model }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          ISSUE_ID=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"query { issue(id:\\\"$TICKET\\\") { id } }\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['issue']['id'])")

          curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { commentCreate(input: { issueId: \\\"$ISSUE_ID\\\", body: \\\"## ❌ dbt Run Failed\\\\n\\\\n\`$MODEL\` failed to materialize.\\\\n\\\\n[View logs]($RUN_URL)\\\\n\\\\n> 🤖 GitHub Actions\\\" }) { success } }\"}"
